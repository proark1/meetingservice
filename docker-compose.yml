services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetingservice
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d meetingservice']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_PUBLIC_URL: postgres://dev:dev@db:5432/meetingservice
      SESSION_SECRET: local-dev-secret
      NODE_ENV: development
      PORT: '3000'

volumes:
  pgdata:
