<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — onepizza.io</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --surface: #fff; --surface2: #f1f5f9;
      --primary: #4f46e5; --primary-hover: #4338ca; --primary-light: #eef0fd;
      --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
      --danger: #ef4444; --success: #10b981;
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .wrap { width: 100%; max-width: 420px; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; color: var(--text); margin-bottom: 32px; justify-content: center; }
    .logo svg { color: var(--primary); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; box-shadow: 0 4px 16px rgba(15,23,42,0.08); }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    /* Account type toggle */
    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .type-btn {
      padding: 12px; border-radius: var(--radius-sm);
      border: 2px solid var(--border); background: var(--surface2);
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      transition: all 0.15s; font-family: inherit;
    }
    .type-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .type-btn svg { transition: color 0.15s; }

    /* Click Hint */
    .ch-wrap {
      position: absolute; pointer-events: none; z-index: 10;
      animation: chLife 4.5s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    .ch-wrap--finger .ch-icon { animation: chFingerTap 4.5s cubic-bezier(0.33,1,0.68,1) forwards; }
    .ch-ripple1 {
      position: absolute; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7); opacity: 0;
      animation: chRipple1 4.5s cubic-bezier(0.33,1,0.68,1) forwards;
    }
    .ch-ripple2 {
      position: absolute; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5); opacity: 0;
      animation: chRipple2 4.5s cubic-bezier(0.33,1,0.68,1) forwards;
    }
    .ch-glow {
      position: absolute; top: 0; left: 0; width: 32px; height: 32px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
      opacity: 0; animation: chGlow 4.5s cubic-bezier(0.33,1,0.68,1) forwards;
    }
    .ch-icon { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)) drop-shadow(0 0 12px rgba(255,255,255,0.3)); }
    @keyframes chLife { 0%{opacity:0;transform:scale(0.8)} 6%{opacity:1;transform:scale(1)} 82%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0.9)} }
    @keyframes chFingerTap { 0%,6%{transform:translate(0,0) scale(1) rotate(0)} 20%{transform:translate(3px,5px) scale(1) rotate(-3deg)} 32%{transform:translate(4px,8px) scale(1) rotate(0)} 40%{transform:translate(4px,13px) scale(0.82) rotate(2deg)} 48%{transform:translate(4px,8px) scale(1) rotate(0)} 58%{transform:translate(4px,13px) scale(0.82) rotate(2deg)} 66%{transform:translate(4px,8px) scale(1) rotate(-1deg)} 100%{transform:translate(4px,8px) scale(1) rotate(0)} }
    @keyframes chRipple1 { 0%,38%{transform:translate(4px,8px) scale(0);opacity:0} 42%{transform:translate(4px,8px) scale(0.6);opacity:0.7} 52%{transform:translate(4px,8px) scale(2.8);opacity:0} 56%,100%{transform:translate(4px,8px) scale(0);opacity:0} }
    @keyframes chRipple2 { 0%,42%{transform:translate(4px,8px) scale(0);opacity:0} 46%{transform:translate(4px,8px) scale(0.4);opacity:0.6} 58%{transform:translate(4px,8px) scale(3.2);opacity:0} 62%,100%{transform:translate(4px,8px) scale(0);opacity:0} }
    @keyframes chGlow { 0%,36%{transform:translate(2px,6px) scale(0);opacity:0} 40%{transform:translate(2px,6px) scale(1.5);opacity:0.9} 48%{transform:translate(2px,6px) scale(0.8);opacity:0.4} 54%{transform:translate(2px,6px) scale(1.8);opacity:0.7} 62%{transform:translate(2px,6px) scale(0.5);opacity:0} 100%{transform:translate(2px,6px) scale(0);opacity:0} }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; margin-top: 14px; }
    input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    input:focus { border-color: var(--primary); background: var(--surface); }
    .btn-submit {
      width: 100%; padding: 13px; margin-top: 20px;
      background: var(--primary); color: white; border: none;
      border-radius: var(--radius-sm); font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s;
    }
    .btn-submit:hover { background: var(--primary-hover); }
    .btn-submit:active { transform: scale(0.98); }
    .error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }
    .success-box { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; margin-top: 20px; }
    .success-box h3 { font-size: 15px; font-weight: 700; color: var(--success); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .key-display { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-family: monospace; font-size: 13px; word-break: break-all; margin: 8px 0; }
    .copy-btn { font-size: 12px; color: var(--primary); background: none; border: none; cursor: pointer; font-weight: 600; padding: 0; }
    .bottom-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .bottom-link a { color: var(--primary); font-weight: 600; }
    .company-only { display: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    onepizza.io
  </div>
  <div class="card">
    <h1>Create your account</h1>
    <p class="sub">Start meeting in seconds. Free forever.</p>

    <div class="type-toggle">
      <button class="type-btn active" id="typPersonal" onclick="setType('personal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Personal
      </button>
      <button class="type-btn" id="typCompany" onclick="setType('company')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Company
      </button>
    </div>

    <div class="company-only" id="companyNameWrap">
      <label for="companyName">Company name</label>
      <input type="text" id="companyName" placeholder="Acme Corp" autocomplete="organization">
    </div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">

    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">

    <div class="error" id="errMsg"></div>

    <button class="btn-submit" id="submitBtn" onclick="doRegister()" style="position:relative;">Create account →
      <span class="ch-wrap ch-wrap--finger" style="right:10px;bottom:-16px;">
        <svg class="ch-icon" width="30" height="34" viewBox="0 0 30 34" fill="white" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v14m0 0l5-1m-5 1l-4-2m9 5c0 3-2.5 5.5-6 5.5S8 26 8 23v-5l-2-3c-1-1.5 0-3.5 1.5-3s3 2 3 2V7a2 2 0 1 1 4 0v7a2 2 0 0 1 4 0v2a2 2 0 0 1 4 0v2a2 2 0 0 1 2 2z"/></svg>
        <span class="ch-ripple1"></span><span class="ch-ripple2"></span><span class="ch-glow"></span>
      </span>
    </button>

    <div class="success-box" id="successBox">
      <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Account created!
      </h3>
      <div id="successBody"></div>
      <a href="/dashboard" style="display:block;text-align:center;margin-top:14px;background:var(--primary);color:white;padding:11px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;">Go to Dashboard →</a>
    </div>

    <div class="bottom-link">Already have an account? <a href="/dashboard">Sign in →</a></div>
  </div>
</div>
<script>
let accountType = 'personal';
// Pre-select from URL param
const urlParams = new URLSearchParams(location.search);
if (urlParams.get('type') === 'company') setType('company');

function setType(t) {
  accountType = t;
  document.getElementById('typPersonal').classList.toggle('active', t === 'personal');
  document.getElementById('typCompany').classList.toggle('active', t === 'company');
  document.getElementById('companyNameWrap').style.display = t === 'company' ? 'block' : 'none';
}

async function doRegister() {
  const email       = document.getElementById('email').value.trim();
  const password    = document.getElementById('password').value;
  const confirm     = document.getElementById('confirm').value;
  const companyName = document.getElementById('companyName').value.trim();
  const errEl       = document.getElementById('errMsg');

  errEl.style.display = 'none';
  if (!email || !password) { showErr('Email and password are required'); return; }
  if (password.length < 8) { showErr('Password must be at least 8 characters'); return; }
  if (password !== confirm) { showErr('Passwords do not match'); return; }
  if (accountType === 'company' && !companyName) { showErr('Company name is required'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  const res  = await fetch('/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password, accountType, companyName }),
  });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Create account →';

  if (!res.ok) { showErr(data.error); return; }

  // Show success
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('successBox').style.display = 'block';

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  const successBody = document.getElementById('successBody');
  successBody.textContent = ''; // clear

  const keyLabel = document.createElement('p');
  keyLabel.style.cssText = 'font-size:13px;color:var(--text-muted);margin-bottom:8px;';
  keyLabel.textContent = 'Your API key — save this, it won\'t be shown again:';
  successBody.appendChild(keyLabel);

  const keyDisplay = document.createElement('div');
  keyDisplay.className = 'key-display';
  keyDisplay.textContent = data.apiKey;
  successBody.appendChild(keyDisplay);

  const copyKeyBtn = document.createElement('button');
  copyKeyBtn.className = 'copy-btn';
  copyKeyBtn.textContent = 'Copy key';
  copyKeyBtn.addEventListener('click', () => { navigator.clipboard.writeText(data.apiKey).then(() => { copyKeyBtn.textContent = 'Copied!'; }); });
  successBody.appendChild(copyKeyBtn);

  if (data.inviteCode) {
    const invLabel = document.createElement('p');
    invLabel.style.cssText = 'font-size:13px;color:var(--text-muted);margin:14px 0 8px;';
    invLabel.textContent = 'Company invite code — share with your team:';
    successBody.appendChild(invLabel);

    const invDisplay = document.createElement('div');
    invDisplay.className = 'key-display';
    invDisplay.textContent = data.inviteCode;
    successBody.appendChild(invDisplay);

    const copyInvBtn = document.createElement('button');
    copyInvBtn.className = 'copy-btn';
    copyInvBtn.textContent = 'Copy invite code';
    copyInvBtn.addEventListener('click', () => { navigator.clipboard.writeText(data.inviteCode).then(() => { copyInvBtn.textContent = 'Copied!'; }); });
    successBody.appendChild(copyInvBtn);
  }
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display = 'block';
}

document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); }));
</script>
</body>
</html>
