<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — onepizza.io</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #E05A33; --primary-hover: #C94D2B;
      --bg: #FAF8F6; --surface: #ffffff; --surface2: #F5F1EB;
      --text: #2B2318; --text-muted: #64748b; --border: #E9E4DD;
      --danger: #ef4444; --success: #10b981;
      --radius: 14px; --radius-xs: 8px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .wrap { width: 100%; max-width: 400px; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; margin-bottom: 32px; justify-content: center; color: var(--text); }
    .logo svg { color: var(--primary); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; box-shadow: 0 4px 20px rgba(15,23,42,.08); }
    .card h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .card p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.06em; }
    input {
      width: 100%; padding: 12px 16px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(224,90,51,0.1); }
    .btn {
      width: 100%; padding: 13px; margin-top: 20px;
      background: var(--primary); color: white; border: none;
      border-radius: var(--radius-xs); font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-xs); display: none; }
    .msg.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: var(--danger); }
    .msg.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: var(--success); }
    .bottom-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .bottom-link a { color: var(--primary); font-weight: 600; }
    #invalidState { display: none; }

    /* Click Hint */
    .ch-wrap {
      position: absolute; pointer-events: none; z-index: 10;
      animation: chLife 4.5s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    .ch-wrap--finger .ch-icon { animation: chFingerTap 4.5s cubic-bezier(0.33,1,0.68,1) infinite; }
    .ch-ripple1 {
      position: absolute; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.7); opacity: 0;
      animation: chRipple1 4.5s cubic-bezier(0.33,1,0.68,1) infinite;
    }
    .ch-ripple2 {
      position: absolute; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5); opacity: 0;
      animation: chRipple2 4.5s cubic-bezier(0.33,1,0.68,1) infinite;
    }
    .ch-glow {
      position: absolute; top: 0; left: 0; width: 32px; height: 32px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
      opacity: 0; animation: chGlow 4.5s cubic-bezier(0.33,1,0.68,1) infinite;
    }
    .ch-icon { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)) drop-shadow(0 0 12px rgba(255,255,255,0.3)); }
    @keyframes chLife { 0%{opacity:0;transform:scale(0.8)} 6%{opacity:1;transform:scale(1)} 82%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0.9)} }
    @keyframes chFingerTap { 0%,6%{transform:translate(0,0) scale(1) rotate(0)} 20%{transform:translate(3px,5px) scale(1) rotate(-3deg)} 32%{transform:translate(4px,8px) scale(1) rotate(0)} 40%{transform:translate(4px,13px) scale(0.82) rotate(2deg)} 48%{transform:translate(4px,8px) scale(1) rotate(0)} 58%{transform:translate(4px,13px) scale(0.82) rotate(2deg)} 66%{transform:translate(4px,8px) scale(1) rotate(-1deg)} 100%{transform:translate(4px,8px) scale(1) rotate(0)} }
    @keyframes chRipple1 { 0%,38%{transform:translate(4px,8px) scale(0);opacity:0} 42%{transform:translate(4px,8px) scale(0.6);opacity:0.7} 52%{transform:translate(4px,8px) scale(2.8);opacity:0} 56%,100%{transform:translate(4px,8px) scale(0);opacity:0} }
    @keyframes chRipple2 { 0%,42%{transform:translate(4px,8px) scale(0);opacity:0} 46%{transform:translate(4px,8px) scale(0.4);opacity:0.6} 58%{transform:translate(4px,8px) scale(3.2);opacity:0} 62%,100%{transform:translate(4px,8px) scale(0);opacity:0} }
    @keyframes chGlow { 0%,36%{transform:translate(2px,6px) scale(0);opacity:0} 40%{transform:translate(2px,6px) scale(1.5);opacity:0.9} 48%{transform:translate(2px,6px) scale(0.8);opacity:0.4} 54%{transform:translate(2px,6px) scale(1.8);opacity:0.7} 62%{transform:translate(2px,6px) scale(0.5);opacity:0} 100%{transform:translate(2px,6px) scale(0);opacity:0} }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    onepizza.io
  </div>
  <div class="card" id="mainCard">
    <h1>Reset password</h1>
    <p>Enter your new password below. Make sure it's at least 8 characters.</p>

    <div id="invalidState" style="display:none">
      <p style="color:var(--danger);font-weight:600">This reset link is invalid or has expired.</p>
      <a href="/dashboard" style="display:block;text-align:center;margin-top:16px;background:var(--primary);color:white;padding:11px;border-radius:var(--radius-xs);font-weight:700;font-size:14px;">Back to Sign In →</a>
    </div>

    <div id="formState">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
      <div class="msg error" id="errMsg"></div>
      <button class="btn" id="submitBtn" onclick="doReset()" style="position:relative;">Set new password →
        <span class="ch-wrap ch-wrap--finger" style="right:10px;bottom:-16px;">
          <svg class="ch-icon" width="30" height="34" viewBox="0 0 30 34" fill="white" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v14m0 0l5-1m-5 1l-4-2m9 5c0 3-2.5 5.5-6 5.5S8 26 8 23v-5l-2-3c-1-1.5 0-3.5 1.5-3s3 2 3 2V7a2 2 0 1 1 4 0v7a2 2 0 0 1 4 0v2a2 2 0 0 1 4 0v2a2 2 0 0 1 2 2z"/></svg>
          <span class="ch-ripple1"></span><span class="ch-ripple2"></span><span class="ch-glow"></span>
        </span>
      </button>
    </div>
  </div>
  <div class="bottom-link"><a href="/dashboard">← Back to sign in</a></div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');

async function checkToken() {
  if (!token) { showInvalid(); return; }
  try {
    const res = await fetch(`/api/auth/reset-password?token=${encodeURIComponent(token)}`);
    if (!res.ok) showInvalid();
  } catch { showInvalid(); }
}

function showInvalid() {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('invalidState').style.display = 'block';
}

async function doReset() {
  const newPassword     = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const errEl           = document.getElementById('errMsg');
  errEl.style.display   = 'none';

  if (!newPassword) { showErr('Please enter a new password'); return; }
  if (newPassword.length < 8) { showErr('Password must be at least 8 characters'); return; }
  if (newPassword !== confirmPassword) { showErr('Passwords do not match'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const res  = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, newPassword }),
  });
  const data = await res.json();

  btn.disabled = false; btn.textContent = 'Set new password →';

  if (!res.ok) { showErr(data.error); return; }

  // Success — redirect to dashboard
  document.getElementById('formState').innerHTML = `
    <p style="color:var(--success);font-weight:700;font-size:15px;margin-bottom:12px">Password updated!</p>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:20px">You can now sign in with your new password.</p>
    <a href="/dashboard" style="display:block;text-align:center;background:var(--primary);color:white;padding:11px;border-radius:var(--radius-xs);font-weight:700;font-size:14px;">Go to Dashboard →</a>
  `;
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display = 'block';
}

document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); }));
checkToken();
</script>
</body>
</html>
