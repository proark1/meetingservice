<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meeting</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ─── Lobby ─────────────────────────────────────────────────────────────── -->
<div class="lobby-overlay" id="lobby">
  <div class="lobby-card">
    <h2 id="lobbyTitle">Getting ready…</h2>
    <p class="meeting-code" id="lobbyCode"></p>
    <div class="lobby-preview" id="lobbyPreview">
      <video id="lobbyVideo" autoplay muted playsinline></video>
      <div class="avatar" id="lobbyAvatar"><span id="lobbyInitial">?</span></div>
    </div>
    <div class="lobby-controls">
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <button class="btn-icon inactive" id="lobbyMicBtn" title="Toggle microphone">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </button>
        <span class="lobby-ctrl-label" id="lobbyMicLabel">Mic on</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <button class="btn-icon inactive" id="lobbyCamBtn" title="Toggle camera">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </button>
        <span class="lobby-ctrl-label" id="lobbyCamLabel">Camera on</span>
      </div>
    </div>
    <input type="text" id="lobbyName" placeholder="Enter your name">
    <p class="lobby-error hidden" id="lobbyError"></p>
    <button class="btn btn-primary" id="lobbyJoinBtn">Join Meeting</button>
  </div>
</div>

<!-- ─── Meeting room ───────────────────────────────────────────────────────── -->
<div class="meeting-container" id="meetingRoom" style="display:none;">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="meeting-title" id="meetingTitle"></span>
      <button class="btn-copy" id="copyLinkBtn" title="Copy meeting link">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="copyLinkText">Copy link</span>
      </button>
    </div>
    <div class="top-bar-center">
      <span class="meeting-timer" id="meetingTimer">0:00</span>
    </div>
    <div class="top-bar-right">
      <div class="recording-indicator hidden" id="recordingIndicator">
        <span class="rec-dot"></span>REC
      </div>
      <button class="participants-pill" id="participantCountBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span id="participantCount">0</span>
      </button>
    </div>
  </div>

  <!-- Video area -->
  <div class="video-area" id="videoArea">

    <!-- Spotlight main view (visible when a tile is pinned) -->
    <div class="spotlight-main hidden" id="spotlightMain">
      <!-- video/avatar injected by JS -->
      <div class="spotlight-label" id="spotlightLabel"></div>
      <button class="unpin-btn" id="unpinBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M21 10c0 2.7-1.7 5.2-3.5 7.1M12 23S3 17 3 10a9 9 0 0 1 4-7.5"/></svg>
        Unpin
      </button>
    </div>

    <!-- Video grid (becomes filmstrip in spotlight mode) -->
    <div class="video-grid grid-1" id="videoGrid"></div>

    <!-- Side panel -->
    <div class="side-panel hidden" id="sidePanel">
      <div class="side-panel-header">
        <span id="sidePanelTitle">Participants</span>
        <button id="closeSidePanel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="side-panel-tabs">
        <button class="active" data-tab="participants">People</button>
        <button data-tab="chat">Chat</button>
      </div>
      <div id="participantsTab">
        <div class="participants-list" id="participantsList"></div>
      </div>
      <div id="chatTab" style="display:none;flex:1;flex-direction:column;">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Send a message…" maxlength="500">
            <button id="chatSendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Device selector dropdown -->
  <div class="device-selector hidden" id="deviceSelector"></div>

  <!-- Controls bar -->
  <div class="controls-bar">
    <div class="controls-info">
      <span class="meeting-timer" id="meetingTimerBar">0:00</span>
    </div>

    <div class="controls-center">
      <!-- Mic -->
      <button class="ctrl-btn" id="micBtn" title="Toggle mic (M)">
        <span class="ctrl-icon" id="micIcon"></span>
        <span class="ctrl-label" id="micLabel">Mute</span>
      </button>
      <!-- Camera -->
      <button class="ctrl-btn" id="camBtn" title="Toggle camera (V)">
        <span class="ctrl-icon" id="camIcon"></span>
        <span class="ctrl-label" id="camLabel">Stop video</span>
      </button>

      <div class="ctrl-divider"></div>

      <!-- Screen share -->
      <button class="ctrl-btn" id="screenBtn" title="Share screen (S)">
        <span class="ctrl-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </span>
        <span class="ctrl-label" id="screenLabel">Present</span>
      </button>
      <!-- Raise hand -->
      <button class="ctrl-btn" id="handBtn" title="Raise hand (H)">
        <span class="ctrl-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
        </span>
        <span class="ctrl-label" id="handLabel">Raise hand</span>
      </button>
      <!-- Reactions -->
      <div class="ctrl-reactions-wrap">
        <button class="ctrl-btn" id="reactBtn" title="Reactions">
          <span class="ctrl-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </span>
          <span class="ctrl-label">React</span>
        </button>
        <div class="reactions-tray hidden" id="reactionsTray">
          <button class="reaction-btn" data-emoji="👍">👍</button>
          <button class="reaction-btn" data-emoji="❤️">❤️</button>
          <button class="reaction-btn" data-emoji="😂">😂</button>
          <button class="reaction-btn" data-emoji="🎉">🎉</button>
          <button class="reaction-btn" data-emoji="👏">👏</button>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- Record -->
      <button class="ctrl-btn" id="recordBtn" title="Record meeting (R)">
        <span class="ctrl-icon" id="recordIcon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </span>
        <span class="ctrl-label" id="recordLabel">Record</span>
      </button>
      <!-- Background blur -->
      <button class="ctrl-btn" id="blurBtn" title="Background effects">
        <span class="ctrl-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </span>
        <span class="ctrl-label">Effects</span>
      </button>
      <!-- Devices -->
      <button class="ctrl-btn" id="deviceBtn" title="Audio & video settings">
        <span class="ctrl-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </span>
        <span class="ctrl-label">Devices</span>
      </button>

      <div class="ctrl-divider"></div>

      <!-- Participants -->
      <button class="ctrl-btn" id="peopleBtn" title="Participants">
        <span class="ctrl-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span class="ctrl-label">People</span>
      </button>
      <!-- Chat -->
      <div style="position:relative;display:inline-flex;align-items:center;">
        <button class="ctrl-btn" id="chatBtn" title="Chat">
          <span class="ctrl-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="ctrl-label">Chat</span>
        </button>
        <span class="chat-badge hidden" id="chatBadge">0</span>
      </div>
    </div><!-- end controls-center -->

    <div class="controls-end">
      <button class="btn-leave" id="leaveBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Leave
      </button>
    </div>
  </div><!-- end controls-bar -->
</div><!-- end meeting-container -->

<script>
// ─── SVG Icons ────────────────────────────────────────────────────────────────
const ICONS = {
  micOn:  `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
  micOff: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
  camOn:  `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`,
  camOff: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`,
  recOn:  `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><rect x="9" y="9" width="6" height="6" fill="currentColor" stroke="none"/></svg>`,
  recOff: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>`,
  muteAllIcon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
};

// ─── State ────────────────────────────────────────────────────────────────────
const meetingId = window.location.pathname.split('/').pop();
const socket = io();

let localStream     = null;
let screenStream    = null;
let myParticipantId = null;
let isAdmin         = false;
let isMuted         = false;
let isVideoOff      = false;
let isScreenSharing = false;
let isHandRaised    = false;
let isBlurOn        = false;
let blurStream      = null;
let blurCanvas      = null;
let blurCtx         = null;
let blurAnimFrame   = null;
let pinnedParticipant = null;

// Recording
let mediaRecorder   = null;
let recordingChunks = [];
let isRecording     = false;
let recAudioCtx     = null;
let recAudioDest    = null;
let recAudioSources = {};
let recFrameId      = null;
let recCanvasEl     = null;

// Speaking detection
let speakAudioCtx   = null;
const speakAnalysers = {};

// Chat
let unreadChatCount = 0;
let lastChatSent    = 0;

// Timer
let meetingStartTime = null;
let timerInterval    = null;

const peers        = {};
const participants = {};

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  {
    urls: ['turn:openrelay.metered.ca:80', 'turn:openrelay.metered.ca:443'],
    username: 'openrelayproject',
    credential: 'openrelayproject',
  },
  {
    urls: 'turns:openrelay.metered.ca:443',
    username: 'openrelayproject',
    credential: 'openrelayproject',
  },
];

const AVATAR_COLORS = ['#4361ee','#7209b7','#f72585','#4cc9f0','#fb8500','#06d6a0'];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);

function escapeHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function getAvatarColor(pid) {
  let h = 0;
  for (let i = 0; i < pid.length; i++) h = (h * 31 + pid.charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' toast-' + type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('toast-fadeout'); setTimeout(() => t.remove(), 310); }, 3200);
}

function showLobbyError(msg) {
  const el = $('#lobbyError');
  el.textContent = msg; el.classList.remove('hidden');
}
function hideLobbyError() { $('#lobbyError').classList.add('hidden'); }

// ─── Meeting timer ────────────────────────────────────────────────────────────
function startTimer() {
  meetingStartTime = Date.now();
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - meetingStartTime) / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const txt = h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
      : `${m}:${String(sec).padStart(2,'0')}`;
    $('#meetingTimer').textContent = txt;
    const bar = $('#meetingTimerBar');
    if (bar) bar.textContent = txt;
  }, 1000);
}

// ─── Speaking detection ───────────────────────────────────────────────────────
function addSpeakAnalyser(pid, stream) {
  if (!stream || !stream.getAudioTracks().length || speakAnalysers[pid]) return;
  try {
    if (!speakAudioCtx) speakAudioCtx = new AudioContext();
    const analyser = speakAudioCtx.createAnalyser();
    analyser.fftSize = 256;
    speakAudioCtx.createMediaStreamSource(stream).connect(analyser);
    speakAnalysers[pid] = { analyser, data: new Uint8Array(analyser.frequencyBinCount) };
  } catch(e) {}
}

function removeSpeakAnalyser(pid) { delete speakAnalysers[pid]; }

setInterval(() => {
  for (const [pid, { analyser, data }] of Object.entries(speakAnalysers)) {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a,b) => a + b, 0) / data.length;
    const speaking = avg > 10 && participants[pid] && !participants[pid].isMuted;
    const tile = document.querySelector(`.video-tile[data-pid="${pid}"]`);
    if (tile) tile.classList.toggle('is-speaking', speaking);
    if (pid === pinnedParticipant) {
      $('#spotlightMain')?.classList.toggle('is-speaking', speaking);
    }
  }
}, 150);

// ─── Lobby ────────────────────────────────────────────────────────────────────
const lobbyNameInput = $('#lobbyName');
lobbyNameInput.value = sessionStorage.getItem('userName') || '';
$('#lobbyCode').textContent = meetingId;

async function initPreview() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    $('#lobbyVideo').srcObject = localStream;
    $('#lobbyAvatar').style.display = 'none';
  } catch {
    $('#lobbyAvatar').style.display = 'flex';
  }
  updateLobbyInitial();
}

function updateLobbyInitial() {
  const name = lobbyNameInput.value.trim();
  $('#lobbyInitial').textContent = name ? name[0].toUpperCase() : '?';
}
lobbyNameInput.addEventListener('input', updateLobbyInitial);

$('#lobbyMicBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  $('#lobbyMicBtn').className = `btn-icon ${isMuted ? 'active' : 'inactive'}`;
  $('#lobbyMicLabel').textContent = isMuted ? 'Mic off' : 'Mic on';
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
});

$('#lobbyCamBtn').addEventListener('click', () => {
  isVideoOff = !isVideoOff;
  $('#lobbyCamBtn').className = `btn-icon ${isVideoOff ? 'active' : 'inactive'}`;
  $('#lobbyCamLabel').textContent = isVideoOff ? 'Camera off' : 'Camera on';
  if (localStream) {
    localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
    $('#lobbyAvatar').style.display = isVideoOff ? 'flex' : 'none';
    $('#lobbyVideo').style.display  = isVideoOff ? 'none' : 'block';
  }
});

$('#lobbyJoinBtn').addEventListener('click', joinMeeting);
lobbyNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinMeeting(); });

function joinMeeting() {
  const name = lobbyNameInput.value.trim();
  if (!name) { showLobbyError('Please enter your name'); return; }
  hideLobbyError();
  sessionStorage.setItem('userName', name);
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  socket.emit('join-meeting', { meetingId, name, isAdmin: !!adminToken, adminToken: adminToken || null });
  $('#lobbyJoinBtn').disabled = true;
  $('#lobbyJoinBtn').textContent = 'Joining…';
}

// Apply server feature flags
fetch('/api/config').then(r => r.json()).then(cfg => {
  if (!cfg.screenShareEnabled) $('#screenBtn').style.display = 'none';
  if (!cfg.recordingEnabled)   $('#recordBtn').style.display = 'none';
  if (!cfg.blurEnabled)        $('#blurBtn').style.display   = 'none';
}).catch(() => {});

initPreview();

// ─── Socket events ────────────────────────────────────────────────────────────
socket.on('error', ({ message }) => {
  showLobbyError(message);
  $('#lobbyJoinBtn').disabled = false;
  $('#lobbyJoinBtn').textContent = 'Join Meeting';
});

socket.on('joined', (data) => {

  // Auto-unpin when screen share stops
  if (prev.isScreenSharing && update.isScreenSharing === false && pinnedParticipant === update.participantId) {

// ─── WebRTC ───────────────────────────────────────────────────────────────────
function createPeerConnection(participantId, initiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[participantId] = { pc, remoteStream: new MediaStream(), screenAudioSender: null };

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('signal:ice-candidate', { to: participantId, candidate: e.candidate });
  };

  pc.ontrack = (e) => {
    e.streams[0].getTracks().forEach(t => peers[participantId].remoteStream.addTrack(t));
    // Start speaking detection once we get audio
    if (!speakAnalysers[participantId]) {
      addSpeakAnalyser(participantId, peers[participantId].remoteStream);
    }
    syncParticipantTile(participantId);
    if (isRecording) addRecAudioSource(participantId);
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed') pc.restartIce();
  };

  if (initiator) {
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal:offer', { to: participantId, offer: pc.localDescription });
      } catch(err) { console.error('Offer error:', err); }
    };
  }
  return pc;
}

socket.on('signal:offer', async ({ from, offer }) => {
  if (!peers[from]) createPeerConnection(from, false);
  try {
    await peers[from].pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peers[from].pc.createAnswer();
    await peers[from].pc.setLocalDescription(answer);
    socket.emit('signal:answer', { to: from, answer: peers[from].pc.localDescription });
  } catch(err) { console.error('Answer error:', err); }
});

socket.on('signal:answer', async ({ from, answer }) => {
  if (peers[from]) {
    try { await peers[from].pc.setRemoteDescription(new RTCSessionDescription(answer)); }
    catch(err) { console.error('Set answer error:', err); }
  }
});

socket.on('signal:ice-candidate', async ({ from, candidate }) => {
  if (peers[from]) {
    try { await peers[from].pc.addIceCandidate(new RTCIceCandidate(candidate)); }
    catch(err) {}
  }
});

$('#screenBtn').addEventListener('click', async () => {
  if (isScreenSharing) { stopScreenShare(); return; }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    const screenVideoTrack = screenStream.getVideoTracks()[0];
    const screenAudioTrack = screenStream.getAudioTracks()[0] || null;

    for (const pid of Object.keys(peers)) {
      const vs = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
      if (vs) await vs.replaceTrack(screenVideoTrack);
      if (screenAudioTrack) {
        const as = peers[pid].pc.getSenders().find(s => s.track?.kind === 'audio');
        if (as) { await as.replaceTrack(screenAudioTrack); peers[pid].screenAudioSender = as; }
      }
    }
    screenVideoTrack.onended = () => stopScreenShare();
    isScreenSharing = true;
    if (participants[myParticipantId]) participants[myParticipantId].isScreenSharing = true;
    socket.emit('media:screen-share', { isScreenSharing: true });
    // Auto-spotlight self when sharing screen
    if (!pinnedParticipant) { pinnedParticipant = myParticipantId; renderVideoGrid(); }
    else { updateControlButtons(); syncParticipantTile(myParticipantId); }
  } catch(err) {
    if (err.name !== 'NotAllowedError') showToast('Screen share failed', 'error');
  }
});

async function stopScreenShare() {
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  if (localStream) {
    const camTrack = localStream.getVideoTracks()[0];
    const micTrack = localStream.getAudioTracks()[0];
    for (const pid of Object.keys(peers)) {
      if (camTrack) {
        const vs = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
        if (vs) await vs.replaceTrack(camTrack);
      }
      if (micTrack) {
        const as = peers[pid].screenAudioSender || peers[pid].pc.getSenders().find(s => s.track?.kind === 'audio');
        if (as) await as.replaceTrack(micTrack);
      }
      peers[pid].screenAudioSender = null;
    }
  }
  isScreenSharing = false;
  if (participants[myParticipantId]) participants[myParticipantId].isScreenSharing = false;
  socket.emit('media:screen-share', { isScreenSharing: false });
  if (pinnedParticipant === myParticipantId) { pinnedParticipant = null; renderVideoGrid(); }
  else { updateControlButtons(); syncParticipantTile(myParticipantId); }
}

// ─── Recording ────────────────────────────────────────────────────────────────
async function startRecording() {
  try {
    recAudioCtx  = new AudioContext();
    recAudioDest = recAudioCtx.createMediaStreamDestination();
    recAudioSources = {};

    if (localStream?.getAudioTracks().length > 0) {
      const src = recAudioCtx.createMediaStreamSource(localStream);
      src.connect(recAudioDest);
      recAudioSources['local'] = src;
    }
    for (const pid of Object.keys(peers)) addRecAudioSource(pid);

    recCanvasEl = document.createElement('canvas');
    recCanvasEl.width = 1280; recCanvasEl.height = 720;
    const ctx = recCanvasEl.getContext('2d');

    function drawFrame() {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, 1280, 720);
      const tiles = [...document.querySelectorAll('#videoGrid .video-tile')];
      const n = tiles.length;
      if (n > 0) {
        const cols = n === 1 ? 1 : n <= 4 ? 2 : 3;
        const rows = Math.ceil(n / cols);
        const w = 1280 / cols, h = 720 / rows;
        tiles.forEach((tile, i) => {
          const x = (i % cols) * w, y = Math.floor(i / cols) * h;
          const vid = tile.querySelector('video');
          const pid = tile.dataset.pid;
          const p = pid ? participants[pid] : null;
          if (vid && vid.readyState >= 2) {
            ctx.drawImage(vid, x, y, w, h);
          } else {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(x, y, w, h);
            if (p) {
              ctx.fillStyle = getAvatarColor(pid);
              ctx.beginPath(); ctx.arc(x+w/2, y+h/2, Math.min(w,h)*0.18, 0, Math.PI*2); ctx.fill();
              ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.min(w,h)*0.14}px sans-serif`;
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText((p.name||'?')[0].toUpperCase(), x+w/2, y+h/2);
            }
          }
          if (p) {
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(x+4, y+h-26, Math.min((p.name?.length||0)*8+20, w-8), 22);
            ctx.fillStyle = '#fff'; ctx.font = '13px sans-serif';
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(p.name||'', x+10, y+h-15);
          }
        });
      }
      recFrameId = requestAnimationFrame(drawFrame);
    }
    drawFrame();

    const combined = new MediaStream([
      ...recCanvasEl.captureStream(30).getVideoTracks(),
      ...recAudioDest.stream.getAudioTracks(),
    ]);
    const mimeType = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
      .find(t => MediaRecorder.isTypeSupported(t)) || '';
    mediaRecorder = new MediaRecorder(combined, mimeType ? { mimeType } : {});
    recordingChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordingChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (recFrameId) { cancelAnimationFrame(recFrameId); recFrameId = null; }
      if (recAudioCtx) { recAudioCtx.close(); recAudioCtx = null; }
      recAudioDest = null; recAudioSources = {}; recCanvasEl = null;
      const blob = new Blob(recordingChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `meeting-${meetingId}-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.webm`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      isRecording = false; updateControlButtons();
      $('#recordingIndicator').classList.add('hidden');
      showToast('Recording saved — check your downloads');
    };
    mediaRecorder.start(1000);
    isRecording = true; updateControlButtons();
    $('#recordingIndicator').classList.remove('hidden');
    showToast('Recording started');
  } catch(err) {
    console.error('Recording error:', err);
    showToast('Recording failed: ' + (err.message || err), 'error');
    if (recAudioCtx) { recAudioCtx.close(); recAudioCtx = null; }
    if (recFrameId) { cancelAnimationFrame(recFrameId); recFrameId = null; }
    isRecording = false;
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

function addRecAudioSource(pid) {
  if (!recAudioCtx || !recAudioDest || recAudioSources[pid]) return;
  const rs = peers[pid]?.remoteStream;
  if (rs?.getAudioTracks().length > 0) {
    try {
      const src = recAudioCtx.createMediaStreamSource(rs);
      src.connect(recAudioDest); recAudioSources[pid] = src;
    } catch(e) {}
  }
}

function removeRecAudioSource(pid) {
  if (recAudioSources[pid]) {
    try { recAudioSources[pid].disconnect(); } catch(e) {}
    delete recAudioSources[pid];
  }
}

// ─── Background blur ──────────────────────────────────────────────────────────
function startBlur() {
  const track = localStream.getVideoTracks()[0];
  const settings = track.getSettings();
  const w = settings.width || 640, h = settings.height || 480;
  blurCanvas = document.createElement('canvas');
  blurCanvas.width = w; blurCanvas.height = h;
  blurCtx = blurCanvas.getContext('2d');
  const tmp = document.createElement('video');
  tmp.srcObject = new MediaStream([track]); tmp.play();
  function draw() {
    if (!isBlurOn) return;
    blurCtx.filter = 'blur(10px)'; blurCtx.drawImage(tmp, 0, 0, w, h);
    blurCtx.filter = 'none'; blurCtx.save();
    blurCtx.beginPath(); blurCtx.ellipse(w/2, h/2.2, w*0.28, h*0.45, 0, 0, Math.PI*2);
    blurCtx.clip(); blurCtx.drawImage(tmp, 0, 0, w, h); blurCtx.restore();
    blurAnimFrame = requestAnimationFrame(draw);
  }
  draw();
  blurStream = blurCanvas.captureStream(24);
  const blurTrack = blurStream.getVideoTracks()[0];
  for (const pid of Object.keys(peers)) {
    const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
    if (s) s.replaceTrack(blurTrack);
  }
  syncParticipantTile(myParticipantId);
}

function stopBlur() {
  if (blurAnimFrame) { cancelAnimationFrame(blurAnimFrame); blurAnimFrame = null; }
  if (localStream) {
    const camTrack = localStream.getVideoTracks()[0];
    for (const pid of Object.keys(peers)) {
      const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
      if (s && camTrack) s.replaceTrack(camTrack);
    }
  }
  if (blurStream) { blurStream.getTracks().forEach(t => t.stop()); blurStream = null; }
  blurCanvas = null; blurCtx = null;
  syncParticipantTile(myParticipantId);
}

$('#deviceBtn').addEventListener('click', async () => {
  const sel = $('#deviceSelector');
  if (!sel.classList.contains('hidden')) { sel.classList.add('hidden'); return; }
  const devices  = await navigator.mediaDevices.enumerateDevices();
  const cameras  = devices.filter(d => d.kind === 'videoinput');
  const mics     = devices.filter(d => d.kind === 'audioinput');
  const speakers = devices.filter(d => d.kind === 'audiooutput');
  const curVid   = localStream?.getVideoTracks()[0]?.getSettings().deviceId || '';
  const curAud   = localStream?.getAudioTracks()[0]?.getSettings().deviceId || '';
  sel.innerHTML = '';
  if (cameras.length) {
    sel.innerHTML += '<h4>Camera</h4>';
    cameras.forEach(d => {
      sel.innerHTML += `<button class="${d.deviceId===curVid?'selected':''}" onclick="switchCamera('${d.deviceId}')">${d.label||'Camera '+d.deviceId.slice(0,4)}</button>`;
    });
  }
  if (mics.length) {
    sel.innerHTML += '<h4>Microphone</h4>';
    mics.forEach(d => {
      sel.innerHTML += `<button class="${d.deviceId===curAud?'selected':''}" onclick="switchMic('${d.deviceId}')">${d.label||'Mic '+d.deviceId.slice(0,4)}</button>`;
    });
  }
  if (speakers.length) {
    sel.innerHTML += '<h4>Speaker</h4>';
    speakers.forEach(d => {
      sel.innerHTML += `<button onclick="switchSpeaker('${d.deviceId}')">${d.label||'Speaker '+d.deviceId.slice(0,4)}</button>`;
    });
  }
  sel.classList.remove('hidden');
});

async function switchCamera(deviceId) {
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } } });
    const newTrack  = newStream.getVideoTracks()[0];
    const oldTrack  = localStream?.getVideoTracks()[0];
    if (oldTrack) { localStream.removeTrack(oldTrack); oldTrack.stop(); }
    if (localStream) localStream.addTrack(newTrack);
    for (const pid of Object.keys(peers)) {
      const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
      if (s) await s.replaceTrack(newTrack);
    }
    syncParticipantTile(myParticipantId);
    $('#deviceSelector').classList.add('hidden');
  } catch(err) { console.error('Switch camera error:', err); }
}

async function switchMic(deviceId) {
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: deviceId } } });
    const newTrack  = newStream.getAudioTracks()[0];
    const oldTrack  = localStream?.getAudioTracks()[0];
    if (oldTrack) { localStream.removeTrack(oldTrack); oldTrack.stop(); }
    if (localStream) localStream.addTrack(newTrack);
    if (isMuted) newTrack.enabled = false;
    for (const pid of Object.keys(peers)) {
      const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'audio');
      if (s) await s.replaceTrack(newTrack);
    }
    $('#deviceSelector').classList.add('hidden');
  } catch(err) { console.error('Switch mic error:', err); }
}

function switchSpeaker(deviceId) {
  document.querySelectorAll('.video-tile video, #spotlightMain video').forEach(v => {
    if (v.setSinkId) v.setSinkId(deviceId);
  });
  $('#deviceSelector').classList.add('hidden');
}

$('#chatSendBtn').addEventListener('click', sendChat);

function sendChat() {
  const now = Date.now();
  if (now - lastChatSent < 300) return;
  const text = $('#chatInput').value.trim();
  if (!text) return;
  lastChatSent = now;
  socket.emit('chat:message', { text });
  $('#chatInput').value = '';
}

socket.on('chat:message', ({ from, name, text, timestamp }) => {
  const container = $('#chatMessages');
  const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const isOwn = from === myParticipantId;
  container.innerHTML += `
    <div class="chat-msg${isOwn ? ' chat-msg-own' : ''}">
      <div class="chat-author">${escapeHtml(name)}${isOwn ? ' (You)' : ''}</div>
      <div class="chat-text">${escapeHtml(text)}</div>
      <div class="chat-time">${time}</div>
    </div>`;
  container.scrollTop = container.scrollHeight;
  const chatOpen = !$('#sidePanel').classList.contains('hidden') &&
    document.querySelector('.side-panel-tabs button.active')?.dataset.tab === 'chat';
  if (!chatOpen) { unreadChatCount++; updateChatBadge(); }
});

// ─── Leave ────────────────────────────────────────────────────────────────────
$('#leaveBtn').addEventListener('click', () => {
  if (!confirm('Leave this meeting?')) return;
  if (isRecording) stopRecording();
  if (localStream)  localStream.getTracks().forEach(t => t.stop());
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  if (timerInterval) clearInterval(timerInterval);
  socket.disconnect();
  window.location.href = '/';
});

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (!myParticipantId) return;
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'm' || e.key === 'M') $('#micBtn').click();
  else if (e.key === 'v' || e.key === 'V') $('#camBtn').click();
  else if (e.key === 's' || e.key === 'S') $('#screenBtn').click();
  else if (e.key === 'h' || e.key === 'H') $('#handBtn').click();
  else if (e.key === 'r' || e.key === 'R') $('#recordBtn').click();
});

// ─── Rendering ────────────────────────────────────────────────────────────────
function updateControlButtons() {
  const micBtn = $('#micBtn');
  micBtn.className = `ctrl-btn${isMuted ? ' state-danger' : ''}`;
  $('#micIcon').innerHTML = isMuted ? ICONS.micOff : ICONS.micOn;
  const micLabel = micBtn.querySelector('.ctrl-label');
  if (micLabel) micLabel.textContent = isMuted ? 'Unmute' : 'Mute';

  const camBtn = $('#camBtn');
  camBtn.className = `ctrl-btn${isVideoOff ? ' state-danger' : ''}`;
  $('#camIcon').innerHTML = isVideoOff ? ICONS.camOff : ICONS.camOn;
  const camLabel = camBtn.querySelector('.ctrl-label');
  if (camLabel) camLabel.textContent = isVideoOff ? 'Start video' : 'Stop video';

  $('#screenBtn').className = `ctrl-btn${isScreenSharing ? ' state-active' : ''}`;
  const screenLabel = $('#screenLabel');
  if (screenLabel) screenLabel.textContent = isScreenSharing ? 'Stop share' : 'Present';

  $('#handBtn').className  = `ctrl-btn${isHandRaised    ? ' state-raised'  : ''}`;
  const handLabel = $('#handLabel');
  if (handLabel) handLabel.textContent = isHandRaised ? 'Lower hand' : 'Raise hand';

  const recBtn = $('#recordBtn');
  recBtn.className = `ctrl-btn${isRecording ? ' state-danger' : ''}`;
  $('#recordIcon').innerHTML = isRecording ? ICONS.recOn : ICONS.recOff;
  const recLabel = $('#recordLabel');
  if (recLabel) recLabel.textContent = isRecording ? 'Stop rec' : 'Record';

  $('#blurBtn').className   = `ctrl-btn${isBlurOn        ? ' state-active'  : ''}`;
}

// Full grid re-render (diff-based to prevent flicker)
function renderVideoGrid() {
  const grid   = $('#videoGrid');
  const allIds = Object.keys(participants);
  const count  = allIds.length;

  if (pinnedParticipant && participants[pinnedParticipant]) {
    // Spotlight mode
    updateSpotlightMain();
    grid.className = 'video-grid filmstrip';
    const filmIds = allIds.filter(id => id !== pinnedParticipant);

    for (const tile of [...grid.querySelectorAll('.video-tile[data-pid]')]) {
      if (!participants[tile.dataset.pid] || tile.dataset.pid === pinnedParticipant) tile.remove();
    }
    for (const pid of filmIds) {
      let tile = grid.querySelector(`.video-tile[data-pid="${pid}"]`);
      if (!tile) { tile = createVideoTile(pid); grid.appendChild(tile); }
      else syncVideoTile(tile, pid);
    }
    $('#videoArea').classList.add('spotlight-active');
    $('#spotlightMain').classList.remove('hidden');
  } else {
    // Normal grid
    $('#videoArea').classList.remove('spotlight-active');
    clearSpotlightMain();
    $('#spotlightMain').classList.add('hidden');

    grid.className = 'video-grid';
    if      (count <= 1) grid.classList.add('grid-1');
    else if (count === 2) grid.classList.add('grid-2');
    else if (count <= 4) grid.classList.add('grid-4');
    else if (count <= 6) grid.classList.add('grid-6');
    else                 grid.classList.add('grid-many');

    for (const tile of [...grid.querySelectorAll('.video-tile[data-pid]')]) {
      if (!participants[tile.dataset.pid]) tile.remove();
    }
    for (const pid of allIds) {
      let tile = grid.querySelector(`.video-tile[data-pid="${pid}"]`);
      if (!tile) { tile = createVideoTile(pid); grid.appendChild(tile); }
      else syncVideoTile(tile, pid);
    }
  }

  $('#participantCount').textContent = count;
  updateControlButtons();
}

// Update single tile (used on state changes)
function syncParticipantTile(pid) {
  if (pid === pinnedParticipant) updateSpotlightMain();
  const tile = document.querySelector(`.video-tile[data-pid="${pid}"]`);
  if (tile) {
    syncVideoTile(tile, pid);
  } else if (pid !== pinnedParticipant) {
    renderVideoGrid(); return;
  }
  $('#participantCount').textContent = Object.keys(participants).length;
  updateControlButtons();
}

function clearSpotlightMain() {
  const sm = $('#spotlightMain');
  const vid = sm.querySelector('video');
  if (vid) { vid.srcObject = null; vid.remove(); }
  const av = sm.querySelector('.sm-avatar');
  if (av) av.remove();
}

function updateSpotlightMain() {
  const sm  = $('#spotlightMain');
  const pid = pinnedParticipant;
  const p   = participants[pid];
  if (!p) return;
  const isLocal = pid === myParticipantId;

  const showVideo = isLocal ? (!p.isVideoOff || p.isScreenSharing) : (!p.isVideoOff && !!peers[pid]);
  let expectedSrc = null;
  if (showVideo) {
    expectedSrc = isLocal
      ? ((isBlurOn && blurStream) ? blurStream : (isScreenSharing && screenStream) ? screenStream : localStream)
      : (peers[pid]?.remoteStream || null);
  }

  let video  = sm.querySelector('video');
  let avatar = sm.querySelector('.sm-avatar');

  if (showVideo && expectedSrc) {
    if (avatar) { avatar.remove(); avatar = null; }
    if (!video) {
      video = document.createElement('video');
      video.autoplay = true; video.playsInline = true;
      if (isLocal) video.muted = true;
      if (isLocal && !p.isScreenSharing) video.classList.add('mirror');
      sm.prepend(video);
    } else {
      video.classList.toggle('mirror', isLocal && !p.isScreenSharing);
    }
    if (video.srcObject !== expectedSrc) video.srcObject = expectedSrc;
  } else {
    if (video) { video.srcObject = null; video.remove(); video = null; }
    if (!avatar) {
      avatar = document.createElement('div');
      avatar.className = 'sm-avatar';
      sm.prepend(avatar);
    }
    avatar.textContent = (p.name||'?')[0].toUpperCase();
    avatar.style.background = getAvatarColor(pid);
  }

  const label = sm.querySelector('.spotlight-label');
  if (label) {
    label.innerHTML = escapeHtml(p.name||'')
      + (p.isMuted ? ' <span class="muted-icon" style="color:var(--danger)">&#x1F507;</span>' : '')
      + (p.isHandRaised ? ' &#x270B;' : '');
  }
}

function createVideoTile(pid) {
  const tile = document.createElement('div');
  tile.dataset.pid = pid;

  const media = document.createElement('div');
  media.className = 'tile-media';
  tile.appendChild(media);

  const screenBadge = document.createElement('div');
  screenBadge.className = 'screen-share-badge';
  screenBadge.textContent = 'Sharing';
  tile.appendChild(screenBadge);

  const pinBtn = document.createElement('button');
  pinBtn.className = 'pin-btn';
  pinBtn.title = 'Pin to spotlight';
  pinBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  pinBtn.addEventListener('click', (e) => { e.stopPropagation(); pinParticipant(pid); });
  tile.appendChild(pinBtn);

  const handBadge = document.createElement('div');
  handBadge.className = 'hand-badge hidden';
  handBadge.textContent = '✋';
  tile.appendChild(handBadge);

  const label = document.createElement('div');
  label.className = 'tile-label';
  tile.appendChild(label);

  const adminActions = document.createElement('div');
  adminActions.className = 'admin-actions';
  tile.appendChild(adminActions);

  // Click filmstrip tile in spotlight mode to switch pinned
  tile.addEventListener('click', () => {
    if (document.querySelector('.video-grid.filmstrip')) pinParticipant(pid);
  });

  syncVideoTile(tile, pid);
  return tile;
}

function syncVideoTile(tile, pid) {
  const p = participants[pid];
  if (!p) return;
  const isLocal = pid === myParticipantId;

  tile.className = 'video-tile';
  if (isLocal && !p.isScreenSharing) tile.classList.add('is-local');

  const showVideo = isLocal ? (!p.isVideoOff || p.isScreenSharing) : (!p.isVideoOff && !!peers[pid]);
  let expectedSrc = null;
  if (showVideo) {
    expectedSrc = isLocal
      ? ((isBlurOn && blurStream) ? blurStream : (isScreenSharing && screenStream) ? screenStream : localStream)
      : (peers[pid]?.remoteStream || null);
  }

  const media  = tile.querySelector('.tile-media');
  let video    = media.querySelector('video');
  let avatar   = media.querySelector('.avatar');

  if (showVideo && expectedSrc) {
    if (!video) {
      if (avatar) { avatar.remove(); avatar = null; }
      video = document.createElement('video');
      video.autoplay = true; video.playsInline = true;
      if (isLocal) video.muted = true;
      media.appendChild(video);
    }
    if (video.srcObject !== expectedSrc) video.srcObject = expectedSrc;
  } else {
    if (video) { video.srcObject = null; video.remove(); video = null; }
    if (!avatar) {
      avatar = document.createElement('div');
      avatar.className = 'avatar';
      media.appendChild(avatar);
    }
    avatar.textContent = (p.name||'?')[0].toUpperCase();
    avatar.style.background = getAvatarColor(pid);
  }

  const screenBadge = tile.querySelector('.screen-share-badge');
  if (screenBadge) screenBadge.style.display = p.isScreenSharing ? 'block' : 'none';

  const handBadge = tile.querySelector('.hand-badge');
  if (handBadge) handBadge.classList.toggle('hidden', !p.isHandRaised);

  const lbl = tile.querySelector('.tile-label');
  if (lbl) {
    lbl.innerHTML = escapeHtml(p.name||'Unknown')
      + (isLocal ? ' <span class="you-tag">(You)</span>' : '')
      + (p.isMuted
          ? ` <span class="muted-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg></span>`
          : '');
  }

  const adminActions = tile.querySelector('.admin-actions');
  if (adminActions) {
    if (isAdmin && !isLocal) {
      adminActions.innerHTML = `
        <button title="${p.isMuted?'Unmute':'Mute'}" onclick="adminToggleMute('${pid}',${p.isMuted})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.isMuted?'<path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="2" x2="22" y2="22"/>':'<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>'}</svg>
        </button>
        <button title="Remove" onclick="adminKick('${pid}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`;
      adminActions.style.display = 'flex';
    } else {
      adminActions.style.display = 'none';
    }
  }
}

function renderParticipantsList() {
  const list = $('#participantsList');
  list.innerHTML = '';

  if (isAdmin) {
    const muteAllBtn = document.createElement('button');
    muteAllBtn.className = 'mute-all-btn';
    muteAllBtn.innerHTML = `${ICONS.muteAllIcon} Mute everyone`;
    muteAllBtn.onclick = adminMuteAll;
    list.appendChild(muteAllBtn);
  }

  for (const [pid, p] of Object.entries(participants)) {
    const isLocal = pid === myParticipantId;
    const item = document.createElement('div');
    item.className = 'participant-item';
    item.innerHTML = `
      <div class="participant-info">
        <div class="participant-avatar" style="background:${getAvatarColor(pid)}">${(p.name||'?')[0].toUpperCase()}</div>
        <div class="participant-name">
          ${escapeHtml(p.name||'Unknown')}
          ${p.isAdmin  ? '<span class="admin-badge">Host</span>' : ''}
          ${isLocal    ? '<span class="you-badge">You</span>'    : ''}
          ${p.isHandRaised ? '<span class="hand-indicator">✋</span>' : ''}
          ${p.isMuted  ? '<span style="color:var(--text-muted);font-size:12px;margin-left:3px;display:inline-flex;align-items:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/></svg></span>' : ''}
        </div>
      </div>
      ${isAdmin && !isLocal ? `
      <div class="participant-actions">
        <button title="${p.isMuted?'Unmute':'Mute'}" onclick="adminToggleMute('${pid}',${p.isMuted})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.isMuted?'<path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><line x1="2" y1="2" x2="22" y2="22"/>':'<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/>'}</svg>
        </button>
        <button title="Remove" onclick="adminKick('${pid}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>` : ''}`;
    list.appendChild(item);
  }
}

function pinParticipant(pid) {
  if (pid === null || pid === pinnedParticipant) {
    pinnedParticipant = null;
  } else {
    pinnedParticipant = pid;
  }
  renderVideoGrid();
}

// ─── Admin helpers ────────────────────────────────────────────────────────────
async function adminToggleMute(pid, currentlyMuted) {
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  await fetch(`/api/meetings/${meetingId}/participants/${pid}/${currentlyMuted ? 'unmute' : 'mute'}`, {
    method: 'POST',
    headers: { 'x-api-key': 'mk_default_test_key', 'x-admin-token': adminToken },
  });
}

async function adminKick(pid) {
  if (!confirm('Remove this participant?')) return;
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  await fetch(`/api/meetings/${meetingId}/participants/${pid}/kick`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': 'mk_default_test_key', 'x-admin-token': adminToken },
    body: JSON.stringify({ reason: 'Removed by host' }),
  });
}

async function adminMuteAll() {
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  await fetch(`/api/meetings/${meetingId}/mute-all`, {
    method: 'POST',
    headers: { 'x-api-key': 'mk_default_test_key', 'x-admin-token': adminToken },
  });
}

// ─── Init control icons ───────────────────────────────────────────────────────
updateControlButtons();
</script>
