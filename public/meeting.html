<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meeting</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ─── Lobby ─────────────────────────────────────────────────────────────── -->
<div class="lobby-overlay" id="lobby">
  <div class="lobby-card">
    <h2 id="lobbyTitle">Getting ready...</h2>
    <p class="meeting-code" id="lobbyCode"></p>
    <div class="lobby-preview" id="lobbyPreview">
      <video id="lobbyVideo" autoplay muted playsinline></video>
      <div class="avatar" id="lobbyAvatar"><span id="lobbyInitial">?</span></div>
    </div>
    <div class="lobby-controls">
      <button class="btn-icon inactive" id="lobbyMicBtn" title="Toggle microphone">🎤</button>
      <button class="btn-icon inactive" id="lobbyCamBtn" title="Toggle camera">📷</button>
    </div>
    <input type="text" id="lobbyName" placeholder="Enter your name">
    <p class="lobby-error hidden" id="lobbyError"></p>
    <button class="btn btn-primary" id="lobbyJoinBtn">Join Meeting</button>
  </div>
</div>

<!-- ─── Meeting room ──────────────────────────────────────────────────────── -->
<div class="meeting-container" id="meetingRoom" style="display:none;">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="meeting-title" id="meetingTitle"></span>
      <span class="meeting-id" id="meetingIdDisplay"></span>
      <button class="btn-copy" id="copyLinkBtn">Copy Link</button>
    </div>
    <div class="top-bar-right">
      <div class="recording-indicator hidden" id="recordingIndicator">
        <span class="rec-dot"></span>REC
      </div>
      <span class="participant-count" id="participantCount">0</span>
    </div>
  </div>

  <!-- Video area -->
  <div class="video-area">
    <div class="video-grid grid-1" id="videoGrid"></div>
    <div class="side-panel hidden" id="sidePanel">
      <div class="side-panel-header">
        <span id="sidePanelTitle">Participants</span>
        <button id="closeSidePanel">&times;</button>
      </div>
      <div class="side-panel-tabs">
        <button class="active" data-tab="participants">People</button>
        <button data-tab="chat">Chat</button>
      </div>
      <div id="participantsTab">
        <div class="participants-list" id="participantsList"></div>
      </div>
      <div id="chatTab" style="display:none;flex:1;flex-direction:column;">
        <div class="chat-container">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Send a message...">
            <button id="chatSendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Device selector dropdown -->
  <div class="device-selector hidden" id="deviceSelector"></div>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="controls-center">
      <button class="btn-icon inactive" id="micBtn"    title="Mute/Unmute (M)">🎤</button>
      <button class="btn-icon inactive" id="camBtn"    title="Camera on/off (V)">📷</button>
      <button class="btn-icon inactive" id="screenBtn" title="Share screen (S)">🖥</button>
      <button class="btn-icon inactive" id="handBtn"   title="Raise hand (H)">✋</button>
      <button class="btn-icon inactive" id="recordBtn" title="Record meeting (R)">⏺</button>
      <button class="btn-icon inactive" id="blurBtn"   title="Background blur">🌀</button>
      <button class="btn-icon inactive" id="deviceBtn" title="Devices">⚙</button>
      <button class="btn-icon inactive" id="peopleBtn" title="Participants">👥</button>
      <div style="position:relative;display:inline-flex;">
        <button class="btn-icon inactive" id="chatBtn" title="Chat">💬</button>
        <span class="chat-badge hidden" id="chatBadge">0</span>
      </div>
      <button class="btn-leave" id="leaveBtn">Leave</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const meetingId = window.location.pathname.split('/').pop();
const socket = io();

let localStream      = null;
let screenStream     = null;
let myParticipantId  = null;
let isAdmin          = false;
let isMuted          = false;
let isVideoOff       = false;
let isScreenSharing  = false;
let isHandRaised     = false;
let isBlurOn         = false;
let blurStream       = null;
let blurCanvas       = null;
let blurCtx          = null;
let blurAnimFrame    = null;

// Recording
let mediaRecorder    = null;
let recordingChunks  = [];
let isRecording      = false;
let recAudioCtx      = null;
let recAudioDest     = null;
let recAudioSources  = {};   // pid -> AudioNode
let recFrameId       = null;
let recCanvasEl      = null;

// Chat
let unreadChatCount  = 0;

const peers        = {};  // participantId -> { pc, remoteStream, screenAudioSender }
const participants = {};  // participantId -> info

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
];

const AVATAR_COLORS = ['#4361ee','#7209b7','#f72585','#4cc9f0','#fb8500','#06d6a0'];

// ─── Helpers ─────────────────────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function getAvatarColor(pid) {
  let h = 0;
  for (let i = 0; i < pid.length; i++) h = (h * 31 + pid.charCodeAt(i)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' toast-' + type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.classList.add('toast-fadeout');
    setTimeout(() => t.remove(), 310);
  }, 3200);
}

function showLobbyError(msg) {
  const el = $('#lobbyError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function hideLobbyError() { $('#lobbyError').classList.add('hidden'); }

// ─── Lobby ───────────────────────────────────────────────────────────────────
const lobbyNameInput = $('#lobbyName');
lobbyNameInput.value = sessionStorage.getItem('userName') || '';
$('#lobbyCode').textContent = meetingId;

async function initPreview() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    $('#lobbyVideo').srcObject = localStream;
    $('#lobbyAvatar').style.display = 'none';
  } catch {
    $('#lobbyAvatar').style.display = 'flex';
  }
  updateLobbyInitial();
}

function updateLobbyInitial() {
  const name = lobbyNameInput.value.trim();
  $('#lobbyInitial').textContent = name ? name[0].toUpperCase() : '?';
}
lobbyNameInput.addEventListener('input', updateLobbyInitial);

$('#lobbyMicBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  $('#lobbyMicBtn').className = `btn-icon ${isMuted ? 'active' : 'inactive'}`;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
});

$('#lobbyCamBtn').addEventListener('click', () => {
  isVideoOff = !isVideoOff;
  $('#lobbyCamBtn').className = `btn-icon ${isVideoOff ? 'active' : 'inactive'}`;
  if (localStream) {
    localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
    $('#lobbyAvatar').style.display = isVideoOff ? 'flex' : 'none';
    $('#lobbyVideo').style.display  = isVideoOff ? 'none' : 'block';
  }
});

$('#lobbyJoinBtn').addEventListener('click', joinMeeting);
lobbyNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinMeeting(); });

function joinMeeting() {
  const name = lobbyNameInput.value.trim();
  if (!name) { showLobbyError('Please enter your name'); return; }
  hideLobbyError();
  sessionStorage.setItem('userName', name);
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  socket.emit('join-meeting', { meetingId, name, isAdmin: !!adminToken, adminToken: adminToken || null });
  $('#lobbyJoinBtn').disabled = true;
  $('#lobbyJoinBtn').textContent = 'Joining…';
}

// Apply server feature flags (hide disabled buttons)
fetch('/api/config').then(r => r.json()).then(cfg => {
  if (!cfg.screenShareEnabled) $('#screenBtn').style.display = 'none';
  if (!cfg.recordingEnabled)   $('#recordBtn').style.display = 'none';
  if (!cfg.blurEnabled)        $('#blurBtn').style.display   = 'none';
}).catch(() => {});

initPreview();

// ─── Socket events ────────────────────────────────────────────────────────────
socket.on('error', ({ message }) => {
  showLobbyError(message);
  $('#lobbyJoinBtn').disabled = false;
  $('#lobbyJoinBtn').textContent = 'Join Meeting';
});

socket.on('joined', (data) => {
  myParticipantId = data.participantId;
  isAdmin = data.isAdmin;

  if (data.muteOnJoin && !isMuted) {
    isMuted = true;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = false);
  }
  if (data.videoOffOnJoin && !isVideoOff) {
    isVideoOff = true;
    if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = false);
  }

  $('#lobby').style.display = 'none';
  $('#meetingRoom').style.display = 'flex';
  $('#meetingTitle').textContent = data.title;
  $('#meetingIdDisplay').textContent = meetingId;
  document.title = data.title + ' - Meeting';

  participants[myParticipantId] = {
    name: sessionStorage.getItem('userName'),
    isMuted, isVideoOff, isScreenSharing: false, isHandRaised: false, isAdmin,
  };

  for (const p of data.participants) {
    participants[p.participantId] = p;
    createPeerConnection(p.participantId, true);
  }

  renderVideoGrid();
  renderParticipantsList();
});

socket.on('participant:joined', (p) => {
  participants[p.participantId] = p;
  createPeerConnection(p.participantId, false);
  if (isRecording) addRecAudioSource(p.participantId);
  renderVideoGrid();
  renderParticipantsList();
  showToast(`${p.name} joined`);
});

socket.on('participant:left', ({ participantId, name }) => {
  delete participants[participantId];
  if (peers[participantId]) { peers[participantId].pc.close(); delete peers[participantId]; }
  if (isRecording) removeRecAudioSource(participantId);
  renderVideoGrid();
  renderParticipantsList();
  showToast(`${name} left`);
});

socket.on('participant:updated', (update) => {
  if (participants[update.participantId]) {
    Object.assign(participants[update.participantId], update);
    syncParticipantTile(update.participantId);
    renderParticipantsList();
  }
});

socket.on('meeting:ended', ({ reason }) => {
  showToast(reason || 'Meeting has ended', 'error');
  setTimeout(() => window.location.href = '/', 2000);
});

socket.on('meeting:all-muted', () => {
  if (!isAdmin) {
    isMuted = true;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = false);
    if (participants[myParticipantId]) participants[myParticipantId].isMuted = true;
    updateControlButtons();
    syncParticipantTile(myParticipantId);
  }
});

socket.on('meeting:settings-updated', () => showToast('Meeting settings updated'));

socket.on('admin:mute', () => {
  isMuted = true;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = false);
  if (participants[myParticipantId]) participants[myParticipantId].isMuted = true;
  updateControlButtons();
  syncParticipantTile(myParticipantId);
  showToast('You were muted by the host');
});

socket.on('admin:unmute', () => {
  isMuted = false;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = true);
  if (participants[myParticipantId]) participants[myParticipantId].isMuted = false;
  updateControlButtons();
  syncParticipantTile(myParticipantId);
  showToast('You were unmuted by the host');
});

socket.on('admin:kick', ({ reason }) => {
  showToast(reason || 'You were removed from the meeting', 'error');
  setTimeout(() => window.location.href = '/', 2000);
});

// ─── WebRTC ───────────────────────────────────────────────────────────────────
function createPeerConnection(participantId, initiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[participantId] = { pc, remoteStream: new MediaStream(), screenAudioSender: null };

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('signal:ice-candidate', { to: participantId, candidate: e.candidate });
  };

  pc.ontrack = (e) => {
    e.streams[0].getTracks().forEach(t => peers[participantId].remoteStream.addTrack(t));
    syncParticipantTile(participantId);
  };

  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed') pc.restartIce();
  };

  if (initiator) {
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal:offer', { to: participantId, offer: pc.localDescription });
      } catch (err) { console.error('Offer error:', err); }
    };
  }
  return pc;
}

socket.on('signal:offer', async ({ from, offer }) => {
  if (!peers[from]) createPeerConnection(from, false);
  try {
    await peers[from].pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peers[from].pc.createAnswer();
    await peers[from].pc.setLocalDescription(answer);
    socket.emit('signal:answer', { to: from, answer: peers[from].pc.localDescription });
  } catch (err) { console.error('Answer error:', err); }
});

socket.on('signal:answer', async ({ from, answer }) => {
  if (peers[from]) {
    try { await peers[from].pc.setRemoteDescription(new RTCSessionDescription(answer)); }
    catch (err) { console.error('Set answer error:', err); }
  }
});

socket.on('signal:ice-candidate', async ({ from, candidate }) => {
  if (peers[from]) {
    try { await peers[from].pc.addIceCandidate(new RTCIceCandidate(candidate)); }
    catch (err) { console.error('ICE error:', err); }
  }
});

// ─── Controls ────────────────────────────────────────────────────────────────
$('#micBtn').addEventListener('click', () => {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  if (participants[myParticipantId]) participants[myParticipantId].isMuted = isMuted;
  socket.emit('media:toggle-audio', { isMuted });
  updateControlButtons();
  syncParticipantTile(myParticipantId);
});

$('#camBtn').addEventListener('click', () => {
  isVideoOff = !isVideoOff;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
  if (participants[myParticipantId]) participants[myParticipantId].isVideoOff = isVideoOff;
  socket.emit('media:toggle-video', { isVideoOff });
  updateControlButtons();
  syncParticipantTile(myParticipantId);
});

$('#screenBtn').addEventListener('click', async () => {
  if (isScreenSharing) { stopScreenShare(); return; }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    const screenVideoTrack = screenStream.getVideoTracks()[0];
    const screenAudioTrack = screenStream.getAudioTracks()[0] || null;

    for (const pid of Object.keys(peers)) {
      const videoSender = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
      if (videoSender) await videoSender.replaceTrack(screenVideoTrack);
      if (screenAudioTrack) {
        const audioSender = peers[pid].pc.getSenders().find(s => s.track?.kind === 'audio');
        if (audioSender) {
          await audioSender.replaceTrack(screenAudioTrack);
          peers[pid].screenAudioSender = audioSender;
        }
      }
    }

    screenVideoTrack.onended = () => stopScreenShare();
    isScreenSharing = true;
    if (participants[myParticipantId]) participants[myParticipantId].isScreenSharing = true;
    socket.emit('media:screen-share', { isScreenSharing: true });
    updateControlButtons();
    syncParticipantTile(myParticipantId);
  } catch (err) {
    if (err.name !== 'NotAllowedError') showToast('Screen share failed', 'error');
  }
});

async function stopScreenShare() {
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  if (localStream) {
    const camTrack = localStream.getVideoTracks()[0];
    const micTrack = localStream.getAudioTracks()[0];
    for (const pid of Object.keys(peers)) {
      if (camTrack) {
        const vs = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
        if (vs) await vs.replaceTrack(camTrack);
      }
      if (micTrack) {
        const as = peers[pid].screenAudioSender || peers[pid].pc.getSenders().find(s => s.track?.kind === 'audio');
        if (as) await as.replaceTrack(micTrack);
      }
      peers[pid].screenAudioSender = null;
    }
  }
  isScreenSharing = false;
  if (participants[myParticipantId]) participants[myParticipantId].isScreenSharing = false;
  socket.emit('media:screen-share', { isScreenSharing: false });
  updateControlButtons();
  syncParticipantTile(myParticipantId);
}

// Raise hand
$('#handBtn').addEventListener('click', () => {
  isHandRaised = !isHandRaised;
  if (participants[myParticipantId]) participants[myParticipantId].isHandRaised = isHandRaised;
  socket.emit('raise-hand', { isHandRaised });
  updateControlButtons();
  syncParticipantTile(myParticipantId);
  renderParticipantsList();
  if (isHandRaised) showToast('Hand raised — host can see this');
});

// Recording
$('#recordBtn').addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});

async function startRecording() {
  try {
    recAudioCtx  = new AudioContext();
    recAudioDest = recAudioCtx.createMediaStreamDestination();
    recAudioSources = {};

    if (localStream?.getAudioTracks().length > 0) {
      const src = recAudioCtx.createMediaStreamSource(localStream);
      src.connect(recAudioDest);
      recAudioSources['local'] = src;
    }
    for (const pid of Object.keys(peers)) addRecAudioSource(pid);

    recCanvasEl = document.createElement('canvas');
    recCanvasEl.width  = 1280;
    recCanvasEl.height = 720;
    const ctx = recCanvasEl.getContext('2d');

    function drawFrame() {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, 1280, 720);

      const tiles = [...document.querySelectorAll('#videoGrid .video-tile')];
      const n = tiles.length;
      if (n > 0) {
        const cols = n === 1 ? 1 : n <= 4 ? 2 : 3;
        const rows = Math.ceil(n / cols);
        const w = 1280 / cols;
        const h = 720  / rows;
        tiles.forEach((tile, i) => {
          const x   = (i % cols) * w;
          const y   = Math.floor(i / cols) * h;
          const vid = tile.querySelector('video');
          const pid = tile.dataset.pid;
          const p   = pid ? participants[pid] : null;
          if (vid && vid.readyState >= 2) {
            ctx.drawImage(vid, x, y, w, h);
          } else {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(x, y, w, h);
            if (p) {
              ctx.fillStyle = getAvatarColor(pid);
              ctx.beginPath();
              ctx.arc(x + w / 2, y + h / 2, Math.min(w, h) * 0.18, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = '#fff';
              ctx.font = `bold ${Math.min(w, h) * 0.14}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText((p.name || '?')[0].toUpperCase(), x + w / 2, y + h / 2);
            }
          }
          if (p) {
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(x + 4, y + h - 26, Math.min((p.name?.length || 0) * 8 + 20, w - 8), 22);
            ctx.fillStyle = '#fff';
            ctx.font = '13px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.name || '', x + 10, y + h - 15);
          }
        });
      }
      recFrameId = requestAnimationFrame(drawFrame);
    }
    drawFrame();

    const videoStream = recCanvasEl.captureStream(30);
    const combined = new MediaStream([
      ...videoStream.getVideoTracks(),
      ...recAudioDest.stream.getAudioTracks(),
    ]);

    const mimeType = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
      .find(t => MediaRecorder.isTypeSupported(t)) || '';

    mediaRecorder   = new MediaRecorder(combined, mimeType ? { mimeType } : {});
    recordingChunks = [];

    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordingChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (recFrameId) { cancelAnimationFrame(recFrameId); recFrameId = null; }
      if (recAudioCtx) { recAudioCtx.close(); recAudioCtx = null; }
      recAudioDest = null; recAudioSources = {}; recCanvasEl = null;
      const blob = new Blob(recordingChunks, { type: 'video/webm' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `meeting-${meetingId}-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.webm`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      isRecording = false;
      updateControlButtons();
      $('#recordingIndicator').classList.add('hidden');
      showToast('Recording saved — check your downloads');
    };

    mediaRecorder.start(1000);
    isRecording = true;
    updateControlButtons();
    $('#recordingIndicator').classList.remove('hidden');
    showToast('Recording started');
  } catch (err) {
    console.error('Recording error:', err);
    showToast('Recording failed: ' + (err.message || err), 'error');
    if (recAudioCtx) { recAudioCtx.close(); recAudioCtx = null; }
    if (recFrameId)  { cancelAnimationFrame(recFrameId); recFrameId = null; }
    isRecording = false;
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

function addRecAudioSource(pid) {
  if (!recAudioCtx || !recAudioDest || recAudioSources[pid]) return;
  const rs = peers[pid]?.remoteStream;
  if (rs?.getAudioTracks().length > 0) {
    try {
      const src = recAudioCtx.createMediaStreamSource(rs);
      src.connect(recAudioDest);
      recAudioSources[pid] = src;
    } catch (e) { console.warn('addRecAudioSource failed for', pid, e); }
  }
}

function removeRecAudioSource(pid) {
  if (recAudioSources[pid]) {
    try { recAudioSources[pid].disconnect(); } catch (e) {}
    delete recAudioSources[pid];
  }
}

// Background blur
$('#blurBtn').addEventListener('click', () => {
  if (!localStream?.getVideoTracks().length) return;
  isBlurOn = !isBlurOn;
  updateControlButtons();
  if (isBlurOn) startBlur(); else stopBlur();
});

function startBlur() {
  const track    = localStream.getVideoTracks()[0];
  const settings = track.getSettings();
  const w = settings.width  || 640;
  const h = settings.height || 480;

  blurCanvas = document.createElement('canvas');
  blurCanvas.width = w; blurCanvas.height = h;
  blurCtx = blurCanvas.getContext('2d');

  const tmp = document.createElement('video');
  tmp.srcObject = new MediaStream([track]);
  tmp.play();

  function draw() {
    if (!isBlurOn) return;
    blurCtx.filter = 'blur(10px)';
    blurCtx.drawImage(tmp, 0, 0, w, h);
    blurCtx.filter = 'none';
    blurCtx.save();
    blurCtx.beginPath();
    blurCtx.ellipse(w / 2, h / 2.2, w * 0.28, h * 0.45, 0, 0, Math.PI * 2);
    blurCtx.clip();
    blurCtx.drawImage(tmp, 0, 0, w, h);
    blurCtx.restore();
    blurAnimFrame = requestAnimationFrame(draw);
  }
  draw();

  blurStream = blurCanvas.captureStream(24);
  const blurTrack = blurStream.getVideoTracks()[0];
  for (const pid of Object.keys(peers)) {
    const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
    if (s) s.replaceTrack(blurTrack);
  }
  syncParticipantTile(myParticipantId);
}

function stopBlur() {
  if (blurAnimFrame) { cancelAnimationFrame(blurAnimFrame); blurAnimFrame = null; }
  if (localStream) {
    const camTrack = localStream.getVideoTracks()[0];
    for (const pid of Object.keys(peers)) {
      const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
      if (s && camTrack) s.replaceTrack(camTrack);
    }
  }
  if (blurStream) { blurStream.getTracks().forEach(t => t.stop()); blurStream = null; }
  blurCanvas = null; blurCtx = null;
  syncParticipantTile(myParticipantId);
}

// Copy link
$('#copyLinkBtn').addEventListener('click', async () => {
  const url = `${location.origin}/join/${meetingId}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Meeting link copied!');
    const btn = $('#copyLinkBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Link', 2000);
  } catch { showToast(`Link: ${url}`); }
});

// Device selection
$('#deviceBtn').addEventListener('click', async () => {
  const sel = $('#deviceSelector');
  if (!sel.classList.contains('hidden')) { sel.classList.add('hidden'); return; }

  const devices  = await navigator.mediaDevices.enumerateDevices();
  const cameras  = devices.filter(d => d.kind === 'videoinput');
  const mics     = devices.filter(d => d.kind === 'audioinput');
  const speakers = devices.filter(d => d.kind === 'audiooutput');
  const curVid   = localStream?.getVideoTracks()[0]?.getSettings().deviceId || '';
  const curAud   = localStream?.getAudioTracks()[0]?.getSettings().deviceId || '';

  sel.innerHTML = '';
  if (cameras.length) {
    sel.innerHTML += '<h4>Camera</h4>';
    cameras.forEach(d => {
      sel.innerHTML += `<button class="${d.deviceId === curVid ? 'selected' : ''}" onclick="switchCamera('${d.deviceId}')">${d.label || 'Camera ' + d.deviceId.slice(0,4)}</button>`;
    });
  }
  if (mics.length) {
    sel.innerHTML += '<h4>Microphone</h4>';
    mics.forEach(d => {
      sel.innerHTML += `<button class="${d.deviceId === curAud ? 'selected' : ''}" onclick="switchMic('${d.deviceId}')">${d.label || 'Mic ' + d.deviceId.slice(0,4)}</button>`;
    });
  }
  if (speakers.length) {
    sel.innerHTML += '<h4>Speaker</h4>';
    speakers.forEach(d => {
      sel.innerHTML += `<button onclick="switchSpeaker('${d.deviceId}')">${d.label || 'Speaker ' + d.deviceId.slice(0,4)}</button>`;
    });
  }
  sel.classList.remove('hidden');
});

async function switchCamera(deviceId) {
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } } });
    const newTrack  = newStream.getVideoTracks()[0];
    const oldTrack  = localStream?.getVideoTracks()[0];
    if (oldTrack)    { localStream.removeTrack(oldTrack); oldTrack.stop(); }
    if (localStream) localStream.addTrack(newTrack);
    for (const pid of Object.keys(peers)) {
      const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'video');
      if (s) await s.replaceTrack(newTrack);
    }
    syncParticipantTile(myParticipantId);
    $('#deviceSelector').classList.add('hidden');
  } catch (err) { console.error('Switch camera error:', err); }
}

async function switchMic(deviceId) {
  try {
    const newStream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: deviceId } } });
    const newTrack  = newStream.getAudioTracks()[0];
    const oldTrack  = localStream?.getAudioTracks()[0];
    if (oldTrack)    { localStream.removeTrack(oldTrack); oldTrack.stop(); }
    if (localStream) localStream.addTrack(newTrack);
    if (isMuted) newTrack.enabled = false;
    for (const pid of Object.keys(peers)) {
      const s = peers[pid].pc.getSenders().find(s => s.track?.kind === 'audio');
      if (s) await s.replaceTrack(newTrack);
    }
    $('#deviceSelector').classList.add('hidden');
  } catch (err) { console.error('Switch mic error:', err); }
}

function switchSpeaker(deviceId) {
  document.querySelectorAll('.video-tile video').forEach(v => { if (v.setSinkId) v.setSinkId(deviceId); });
  $('#deviceSelector').classList.add('hidden');
}

document.addEventListener('click', (e) => {
  const sel = $('#deviceSelector');
  if (!sel.classList.contains('hidden') && !sel.contains(e.target) && e.target.id !== 'deviceBtn') {
    sel.classList.add('hidden');
  }
});

// Side panel
$('#peopleBtn').addEventListener('click', () => toggleSidePanel('participants'));
$('#chatBtn').addEventListener('click', () => {
  toggleSidePanel('chat');
  unreadChatCount = 0;
  updateChatBadge();
});
$('#closeSidePanel').addEventListener('click', () => $('#sidePanel').classList.add('hidden'));

document.querySelectorAll('.side-panel-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.side-panel-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    $('#participantsTab').style.display = tab === 'participants' ? 'block' : 'none';
    $('#chatTab').style.display         = tab === 'chat'         ? 'flex'  : 'none';
    $('#sidePanelTitle').textContent    = tab === 'participants' ? 'Participants' : 'Chat';
    if (tab === 'chat') { unreadChatCount = 0; updateChatBadge(); }
  });
});

function toggleSidePanel(tab) {
  const panel = $('#sidePanel');
  if (!panel.classList.contains('hidden')) {
    const active = document.querySelector('.side-panel-tabs button.active')?.dataset.tab;
    if (active === tab) { panel.classList.add('hidden'); return; }
  }
  panel.classList.remove('hidden');
  document.querySelector(`.side-panel-tabs button[data-tab="${tab}"]`).click();
}

function updateChatBadge() {
  const badge = $('#chatBadge');
  if (unreadChatCount > 0) {
    badge.textContent = unreadChatCount > 9 ? '9+' : unreadChatCount;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

// Chat
$('#chatSendBtn').addEventListener('click', sendChat);
$('#chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

function sendChat() {
  const text = $('#chatInput').value.trim();
  if (!text) return;
  socket.emit('chat:message', { text });
  $('#chatInput').value = '';
}

socket.on('chat:message', ({ from, name, text, timestamp }) => {
  const container = $('#chatMessages');
  const time      = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const isOwn     = from === myParticipantId;
  container.innerHTML += `
    <div class="chat-msg${isOwn ? ' chat-msg-own' : ''}">
      <div class="chat-author">${escapeHtml(name)}${isOwn ? ' (You)' : ''}</div>
      <div class="chat-text">${escapeHtml(text)}</div>
      <div class="chat-time">${time}</div>
    </div>`;
  container.scrollTop = container.scrollHeight;

  const chatOpen = !$('#sidePanel').classList.contains('hidden') &&
    document.querySelector('.side-panel-tabs button.active')?.dataset.tab === 'chat';
  if (!chatOpen) { unreadChatCount++; updateChatBadge(); }
});

// Leave
$('#leaveBtn').addEventListener('click', () => {
  if (!confirm('Leave this meeting?')) return;
  if (isRecording) stopRecording();
  if (localStream)  localStream.getTracks().forEach(t => t.stop());
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  socket.disconnect();
  window.location.href = '/';
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!myParticipantId) return;
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'm' || e.key === 'M') $('#micBtn').click();
  else if (e.key === 'v' || e.key === 'V') $('#camBtn').click();
  else if (e.key === 's' || e.key === 'S') $('#screenBtn').click();
  else if (e.key === 'h' || e.key === 'H') $('#handBtn').click();
  else if (e.key === 'r' || e.key === 'R') $('#recordBtn').click();
});

// ─── Rendering ────────────────────────────────────────────────────────────────
function updateControlButtons() {
  $('#micBtn').className    = `btn-icon ${isMuted         ? 'active' : 'inactive'}`;
  $('#camBtn').className    = `btn-icon ${isVideoOff      ? 'active' : 'inactive'}`;
  $('#screenBtn').className = `btn-icon ${isScreenSharing ? 'btn-on' : 'inactive'}`;
  $('#handBtn').className   = `btn-icon ${isHandRaised    ? 'btn-on' : 'inactive'}`;
  $('#recordBtn').className = `btn-icon ${isRecording     ? 'active' : 'inactive'}`;
  $('#blurBtn').className   = `btn-icon ${isBlurOn        ? 'btn-on' : 'inactive'}`;
}

// Full grid re-render: diff-based — preserves existing video elements to prevent flicker
function renderVideoGrid() {
  const grid   = $('#videoGrid');
  const allIds = Object.keys(participants);
  const count  = allIds.length;

  grid.className = 'video-grid';
  if      (count <= 1) grid.classList.add('grid-1');
  else if (count === 2) grid.classList.add('grid-2');
  else if (count <= 4) grid.classList.add('grid-4');
  else if (count <= 6) grid.classList.add('grid-6');
  else                 grid.classList.add('grid-many');

  // Remove tiles for participants that left
  for (const tile of [...grid.querySelectorAll('.video-tile[data-pid]')]) {
    if (!participants[tile.dataset.pid]) tile.remove();
  }
  // Add or update tiles
  for (const pid of allIds) {
    let tile = grid.querySelector(`.video-tile[data-pid="${pid}"]`);
    if (!tile) { tile = createVideoTile(pid); grid.appendChild(tile); }
    else       { syncVideoTile(tile, pid); }
  }

  $('#participantCount').textContent = count;
  updateControlButtons();
}

// Sync just one tile without rebuilding the whole grid
function syncParticipantTile(pid) {
  const tile = document.querySelector(`.video-tile[data-pid="${pid}"]`);
  if (tile) {
    syncVideoTile(tile, pid);
    $('#participantCount').textContent = Object.keys(participants).length;
    updateControlButtons();
  } else {
    renderVideoGrid();
  }
}

function createVideoTile(pid) {
  const tile = document.createElement('div');
  tile.dataset.pid = pid;

  const media = document.createElement('div');
  media.className = 'tile-media';
  tile.appendChild(media);

  const screenBadge = document.createElement('div');
  screenBadge.className = 'screen-share-badge';
  screenBadge.textContent = 'Screen';
  tile.appendChild(screenBadge);

  const handBadge = document.createElement('div');
  handBadge.className = 'hand-badge hidden';
  handBadge.textContent = '✋';
  tile.appendChild(handBadge);

  const label = document.createElement('div');
  label.className = 'tile-label';
  tile.appendChild(label);

  const adminActions = document.createElement('div');
  adminActions.className = 'admin-actions';
  tile.appendChild(adminActions);

  syncVideoTile(tile, pid);
  return tile;
}

function syncVideoTile(tile, pid) {
  const p      = participants[pid];
  if (!p) return;
  const isLocal = pid === myParticipantId;

  // Mirror only when local + showing camera (not screen share)
  tile.className = 'video-tile';
  if (isLocal && !p.isScreenSharing) tile.classList.add('is-local');

  // Determine video source
  const showVideo = isLocal ? (!p.isVideoOff || p.isScreenSharing) : (!p.isVideoOff && !!peers[pid]);
  let expectedSrc = null;
  if (showVideo) {
    expectedSrc = isLocal
      ? ((isBlurOn && blurStream) ? blurStream : (isScreenSharing && screenStream) ? screenStream : localStream)
      : (peers[pid]?.remoteStream || null);
  }

  const media  = tile.querySelector('.tile-media');
  let video    = media.querySelector('video');
  let avatar   = media.querySelector('.avatar');

  if (showVideo && expectedSrc) {
    if (!video) {
      if (avatar) { avatar.remove(); avatar = null; }
      video = document.createElement('video');
      video.autoplay    = true;
      video.playsInline = true;
      if (isLocal) video.muted = true;
      media.appendChild(video);
    }
    if (video.srcObject !== expectedSrc) video.srcObject = expectedSrc;
  } else {
    if (video) { video.srcObject = null; video.remove(); video = null; }
    if (!avatar) {
      avatar = document.createElement('div');
      avatar.className = 'avatar';
      media.appendChild(avatar);
    }
    avatar.textContent   = (p.name || '?')[0].toUpperCase();
    avatar.style.background = getAvatarColor(pid);
  }

  // Badges
  const screenBadge = tile.querySelector('.screen-share-badge');
  if (screenBadge) screenBadge.style.display = p.isScreenSharing ? 'block' : 'none';

  const handBadge = tile.querySelector('.hand-badge');
  if (handBadge) handBadge.classList.toggle('hidden', !p.isHandRaised);

  // Name label
  const label = tile.querySelector('.tile-label');
  if (label) {
    label.innerHTML = `${escapeHtml(p.name || 'Unknown')}`
      + (isLocal ? ' <span class="you-tag">(You)</span>' : '')
      + (p.isMuted ? ' <span class="muted-icon">🔇</span>' : '');
  }

  // Admin actions
  const adminActions = tile.querySelector('.admin-actions');
  if (adminActions) {
    if (isAdmin && !isLocal) {
      adminActions.innerHTML = `
        <button title="${p.isMuted ? 'Unmute' : 'Mute'}" onclick="adminToggleMute('${pid}',${p.isMuted})">${p.isMuted ? '🔇' : '🎤'}</button>
        <button title="Remove" onclick="adminKick('${pid}')">✕</button>`;
      adminActions.style.display = 'flex';
    } else {
      adminActions.style.display = 'none';
    }
  }
}

function renderParticipantsList() {
  const list = $('#participantsList');
  list.innerHTML = '';
  for (const [pid, p] of Object.entries(participants)) {
    const isLocal = pid === myParticipantId;
    const item = document.createElement('div');
    item.className = 'participant-item';
    item.innerHTML = `
      <div class="participant-info">
        <div class="participant-avatar" style="background:${getAvatarColor(pid)}">${(p.name||'?')[0].toUpperCase()}</div>
        <div class="participant-name">
          ${escapeHtml(p.name || 'Unknown')}
          ${p.isAdmin  ? '<span class="admin-badge">Host</span>' : ''}
          ${isLocal    ? '<span class="you-badge">You</span>' : ''}
          ${p.isHandRaised ? '<span class="hand-indicator">✋</span>' : ''}
          ${p.isMuted  ? '<span style="color:var(--text-muted);font-size:13px">🔇</span>' : ''}
        </div>
      </div>
      ${isAdmin && !isLocal ? `
      <div class="participant-actions">
        <button title="${p.isMuted?'Unmute':'Mute'}" onclick="adminToggleMute('${pid}',${p.isMuted})">${p.isMuted?'🔇':'🎤'}</button>
        <button title="Remove" onclick="adminKick('${pid}')">✕</button>
      </div>` : ''}`;
    list.appendChild(item);
  }
}

// Admin helpers
async function adminToggleMute(pid, currentlyMuted) {
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  await fetch(`/api/meetings/${meetingId}/participants/${pid}/${currentlyMuted ? 'unmute' : 'mute'}`, {
    method: 'POST',
    headers: { 'x-api-key': 'mk_default_test_key', 'x-admin-token': adminToken },
  });
}

async function adminKick(pid) {
  if (!confirm('Remove this participant?')) return;
  const adminToken = sessionStorage.getItem(`admin_${meetingId}`);
  await fetch(`/api/meetings/${meetingId}/participants/${pid}/kick`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': 'mk_default_test_key', 'x-admin-token': adminToken },
    body: JSON.stringify({ reason: 'Removed by host' }),
  });
}
</script>
