<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — onepizza.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-hover: #3451d1;
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
      --danger: #ef4444; --radius: 14px; --radius-xs: 8px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; -webkit-font-smoothing: antialiased;
    }
    .login-wrap { width: 100%; max-width: 400px; }
    .login-logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 16px; margin-bottom: 32px; justify-content: center;
    }
    .logo-icon {
      width: 34px; height: 34px; background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px;
      box-shadow: 0 4px 20px rgba(15,23,42,0.08);
    }
    .login-card h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .login-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .field input {
      width: 100%; padding: 12px 16px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .field input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(67,97,238,0.1); }
    .error-msg {
      display: none; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-xs); padding: 10px 14px;
      font-size: 13px; color: var(--danger); margin-bottom: 16px;
    }
    .btn-login {
      width: 100%; padding: 13px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius-xs);
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
      margin-top: 4px; transition: background 0.15s, transform 0.1s;
    }
    .btn-login:hover { background: var(--primary-hover); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link { margin-top: 20px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .back-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(67,97,238,0.08); border: 1px solid rgba(67,97,238,0.15);
      border-radius: 99px; padding: 4px 12px; font-size: 11px; font-weight: 700;
      color: var(--primary); margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </div>
    onepizza.io
  </div>
  <div class="login-card">
    <div class="admin-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4 7l8 5 8-5-8-5zM4 17l8 5 8-5M4 12l8 5 8-5"/></svg>
      Administrator Access
    </div>
    <h1>Admin Sign In</h1>
    <p>Sign in to manage meetings, users, billing, and platform settings.</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <p class="back-link">
      <a href="/">← Back to home</a>
    </p>
  </div>
</div>

<script>
const emailEl = document.getElementById('email');
const passEl  = document.getElementById('password');
const btn     = document.getElementById('loginBtn');
const errEl   = document.getElementById('errorMsg');

function showError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }

async function login() {
  const email    = emailEl.value.trim();
  const password = passEl.value;
  if (!email || !password) return showError('Please enter your email and password');
  btn.disabled = true; btn.textContent = 'Signing in…';
  errEl.style.display = 'none';
  try {
    const res  = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Login failed'); }
    else         { window.location.href = '/admin/dashboard'; }
  } catch (e) {
    showError('Network error — please try again');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

btn.addEventListener('click', login);
[emailEl, passEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') login(); }));
</script>
</body>
</html>
